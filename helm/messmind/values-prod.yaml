# ── Production environment overrides ────────────────────
replicaCount:
  frontend: 2      # HA: 2 replicas of frontend
  backend: 2       # HA: 2 replicas of backend

image:
  frontend:
    tag: "1.0.0"   # Pinned to a versioned release tag (never use 'latest' in prod)
  backend:
    tag: "1.0.0"

service:
  frontend:
    type: LoadBalancer
  backend:
    type: ClusterIP

resources:
  backend:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
