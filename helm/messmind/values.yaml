# ─────────────────────────────────────────────────────────
# Messmind Helm Chart — Default Values
# Override these per environment in values-dev/staging/prod
# ─────────────────────────────────────────────────────────

# ── Deployment replicas ───────────────────────────────────
replicaCount:
  frontend: 1
  backend: 1

# ── Docker images ─────────────────────────────────────────
image:
  registry: docker.io
  frontend:
    repository: omeshbala/messmind-frontend
    tag: latest
    pullPolicy: Always
  backend:
    repository: omeshbala/messmind-backend
    tag: latest
    pullPolicy: Always

# ── Service types ─────────────────────────────────────────
service:
  frontend:
    type: LoadBalancer
    port: 80
  backend:
    type: ClusterIP
    port: 5000

# ── Resource limits ───────────────────────────────────────
resources:
  frontend:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
  backend:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# ── Environment variables (non-secret) ────────────────────
env:
  DB_PORT: "1433"
  AZURE_STORAGE_CONTAINER_NAME: "menu-images"
  AZURE_DEPLOYMENT: "gpt-4o-mini"
  AZURE_API_VERSION: "2024-02-15-preview"
  PORT: "5000"

# ── Secrets — must be created separately via kubectl ──────
# kubectl create secret generic messmind-secrets \
#   --from-literal=DB_SERVER=... \
#   --from-literal=DB_DATABASE=... etc.
existingSecret: messmind-secrets

# ── Namespace ─────────────────────────────────────────────
namespace: messmind
