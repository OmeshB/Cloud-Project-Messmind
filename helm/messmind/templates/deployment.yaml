{{- /*
  Messmind Backend Deployment
  Rendered with values from values.yaml (overridden per env)
*/ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: messmind-backend
  namespace: {{ .Values.namespace }}
  labels:
    app: messmind
    component: backend
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  replicas: {{ .Values.replicaCount.backend }}
  selector:
    matchLabels:
      app: messmind
      component: backend
  template:
    metadata:
      labels:
        app: messmind
        component: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.registry }}/{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.backend.port }}
          env:
            - name: PORT
              value: {{ .Values.env.PORT | quote }}
            - name: DB_PORT
              value: {{ .Values.env.DB_PORT | quote }}
            - name: AZURE_STORAGE_CONTAINER_NAME
              value: {{ .Values.env.AZURE_STORAGE_CONTAINER_NAME | quote }}
            - name: AZURE_DEPLOYMENT
              value: {{ .Values.env.AZURE_DEPLOYMENT | quote }}
            - name: AZURE_API_VERSION
              value: {{ .Values.env.AZURE_API_VERSION | quote }}
            {{- $secret := .Values.existingSecret }}
            {{- range list "DB_SERVER" "DB_DATABASE" "DB_USER" "DB_PASSWORD" "AZURE_STORAGE_CONNECTION_STRING" "GEMINI_API_KEY" "GROQ_API_KEY" "AZURE_API_KEY" "AZURE_ENDPOINT" "AZURE_CONTENT_SAFETY_KEY" "AZURE_CONTENT_SAFETY_ENDPOINT" }}
            - name: {{ . }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secret }}
                  key: {{ . }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources.backend | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/ping
              port: {{ .Values.service.backend.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/ping
              port: {{ .Values.service.backend.port }}
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: messmind-frontend
  namespace: {{ .Values.namespace }}
  labels:
    app: messmind
    component: frontend
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  replicas: {{ .Values.replicaCount.frontend }}
  selector:
    matchLabels:
      app: messmind
      component: frontend
  template:
    metadata:
      labels:
        app: messmind
        component: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.image.registry }}/{{ .Values.image.frontend.repository }}:{{ .Values.image.frontend.tag }}"
          imagePullPolicy: {{ .Values.image.frontend.pullPolicy }}
          ports:
            - containerPort: 80
          resources:
            {{- toYaml .Values.resources.frontend | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
