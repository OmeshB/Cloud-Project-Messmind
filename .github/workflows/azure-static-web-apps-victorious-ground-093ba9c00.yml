name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # 🔍 Debug (optional)
      - name: Show folder structure
        run: ls -R

      # ✅ Install (ROOT LEVEL)
      - name: Install dependencies
        run: npm install

      # ✅ Build (ROOT LEVEL)
      - name: Build app
        run: npm run build

      # 🚀 Deploy
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_GROUND_093BA9C00 }}
          action: "upload"
          app_location: "/"          # ✅ ROOT
          output_location: "dist/spa"