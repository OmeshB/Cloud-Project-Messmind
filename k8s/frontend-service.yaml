# ─────────────────────────────────────────────────────────
# Messmind Frontend — Kubernetes Service
# LoadBalancer: exposes app to the internet (Azure will
#               assign a public IP automatically)
# ─────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: messmind-frontend-svc
  namespace: messmind
  labels:
    app: messmind
    component: frontend
spec:
  selector:
    app: messmind
    component: frontend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
