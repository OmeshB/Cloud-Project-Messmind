# ─────────────────────────────────────────────────────────
# Messmind Frontend — Kubernetes Deployment
# Image: omeshbala/messmind-frontend:latest  (Docker Hub)
# Port:  80  (Nginx)
# ─────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: messmind-frontend
  namespace: messmind
  labels:
    app: messmind
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: messmind
      component: frontend
  template:
    metadata:
      labels:
        app: messmind
        component: frontend
    spec:
      containers:
        - name: frontend
          image: omeshbala/messmind-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
