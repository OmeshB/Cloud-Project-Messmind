# ─────────────────────────────────────────────────────────
# Messmind Backend — Kubernetes Service
# ClusterIP: internal access within the cluster
# NodePort:  external access for local testing
# ─────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: messmind-backend-svc
  namespace: messmind
  labels:
    app: messmind
    component: backend
spec:
  selector:
    app: messmind
    component: backend
  ports:
    - name: http
      protocol: TCP
      port: 5000
      targetPort: 5000
  type: ClusterIP
